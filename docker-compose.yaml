services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - erp
    depends_on:
      - erp_panel

  erp_panel:
    restart: unless-stopped
    build:
      context: ./
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - ./:/app
    #      - ./app:/app
    command: 'php artisan serve --host=0.0.0.0'
    stdin_open: true
    tty: true
    environment:
      - HOME=/tmp
    depends_on:
      - erp_db
    networks:
      - erp

  erp_db:
    restart: unless-stopped
    image: mysql:8
    container_name: erp_db
    ports:
      - "0.0.0.0:3312:3306"
    environment:
      MYSQL_DATABASE: erp
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    volumes:
      - ./storage/dbdata:/var/lib/mysql
    networks:
      - erp
volumes:
  caddy_data:
  caddy_config:

networks:
  erp:
